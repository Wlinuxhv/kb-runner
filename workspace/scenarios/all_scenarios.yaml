scenarios:
  - name: daily_check
    description: 日常巡检场景
    cases:
      - security_check
      - performance_check
    execution:
      parallel: true
      max_parallel: 3
      timeout: 900s
      fail_fast: false

  - name: security_audit
    description: 安全审计场景
    cases:
      - security_check
    execution:
      parallel: false
      timeout: 1800s
      fail_fast: false
